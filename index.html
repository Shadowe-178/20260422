<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陳瑋生 · 電子名片</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Ma Shan Zheng', cursive;
    }
    body {
      min-height: 100vh;
      background: #EAF4FB;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }
    .card {
      width: 420px;
      background: #FAFEFF;
      border: 0.5px solid #C8E6F5;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(123,184,216,0.15);
    }
    .card-header {
      background: linear-gradient(135deg, #D6EEF9 0%, #BFE0F2 100%);
      padding: 2rem 2rem 3.5rem;
      position: relative;
      overflow: hidden;
    }
    .card-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 40px;
      background: #FAFEFF;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.35;
      background: #fff;
    }
    .avatar-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      border: 3px solid rgba(255,255,255,0.8);
    }
    .avatar-inner {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: #A8D4EE;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 500;
      color: #1E5A7A;
    }
    .name {
      font-size: 24px; font-weight: 500;
      color: #1E4A66; margin: 0 0 6px;
      letter-spacing: 2px;
    }
    .title-badge {
      display: inline-block;
      background: rgba(255,255,255,0.6);
      color: #3A7A9C;
      font-size: 13px;
      padding: 3px 14px;
      border-radius: 20px;
      letter-spacing: 1px;
    }
    .card-body { padding: 1rem 1.75rem 1.5rem; background: #FAFEFF; }
    .company-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 1.25rem;
      padding: 10px 14px;
      background: #EDF6FC;
      border-radius: 10px;
      border: 0.5px solid #C8E6F5;
    }
    .company-icon {
      width: 32px; height: 32px;
      background: #C8E6F5;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .company-name { font-size: 15px; font-weight: 500; color: #1E5A7A; margin: 0; }
    .company-sub { font-size: 12px; color: #5A8FAA; margin: 0; }
    .divider { height: 0.5px; background: #C8E6F5; margin: 0 0 1.25rem; }
    .section-label { font-size: 12px; color: #7AAAC4; letter-spacing: 0.08em; margin: 0 0 10px; }
    .info-row { display: flex; align-items: center; gap: 12px; margin-bottom: 0.75rem; }
    .info-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: #EDF6FC;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border: 0.5px solid #C8E6F5;
    }
    .info-label { font-size: 11px; color: #7AAAC4; margin: 0 0 1px; }
    .info-value { font-size: 14px; color: #1E4A66; margin: 0; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
    .skill-tag {
      font-size: 13px; padding: 4px 13px; border-radius: 20px;
      background: #D6EEF9; color: #1E5A7A; border: 0.5px solid #A8D4EE;
    }
    .hobby-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .hobby-tag {
      font-size: 13px; padding: 4px 13px; border-radius: 20px;
      background: #F0F9FF; color: #5A8FAA; border: 0.5px solid #C8E6F5;
    }
    .card-footer {
      border-top: 0.5px solid #C8E6F5;
      padding: 12px 1.75rem;
      display: flex; justify-content: space-between; align-items: center;
      background: #F0F9FF;
    }
    .footer-text { font-size: 12px; color: #7AAAC4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="deco-circle" style="width:130px;height:130px;top:-45px;right:-35px;"></div>
      <div class="deco-circle" style="width:65px;height:65px;top:35px;right:65px;"></div>
      <div class="avatar-ring">
        <div class="avatar-inner">陳瑋</div>
      </div>
      <p class="name">陳瑋生</p>
      <span class="title-badge">維修人員</span>
    </div>

    <div class="card-body">
      <div class="company-row">
        <div class="company-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="7" width="12" height="8" rx="1" stroke="#1E5A7A" stroke-width="1.2" fill="none"/>
            <path d="M5 7V5C5 3.34 6.34 2 8 2C9.66 2 11 3.34 11 5V7" stroke="#1E5A7A" stroke-width="1.2" stroke-linecap="round" fill="none"/>
            <circle cx="8" cy="11" r="1" fill="#1E5A7A"/>
          </svg>
        </div>
        <div>
          <p class="company-name">店小二維修團隊</p>
          <p class="company-sub">專業維修服務</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="info-row">
        <div class="info-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13 10.8L10.7 10.1L9.5 11.5C7.6 10.6 5.4 8.4 4.5 6.5L5.9 5.3L5.2 3H2.7C2.3 7.8 8.2 13.7 13 13.3L13 10.8Z" stroke="#7BB8D8" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div>
          <p class="info-label">電話</p>
          <p class="info-value">0903-853-385</p>
        </div>
      </div>

      <div class="info-row" style="margin-bottom:1.25rem">
        <div class="info-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="10" rx="1.5" stroke="#7BB8D8" stroke-width="1.2" fill="none"/>
            <path d="M2 6L8 9.5L14 6" stroke="#7BB8D8" stroke-width="1.2"/>
          </svg>
        </div>
        <div>
          <p class="info-label">Email</p>
          <p class="info-value" style="color:#5A9EC4;">onlysm958et@gmail.com</p>
        </div>
      </div>

      <div class="divider"></div>

      <p class="section-label">專業技能</p>
      <div class="skill-tags">
        <span class="skill-tag">大型重型機具拆修</span>
        <span class="skill-tag">家用水電修繕</span>
      </div>

      <div class="divider"></div>

      <p class="section-label">興趣愛好</p>
      <div class="hobby-tags">
        <span class="hobby-tag">公路車</span>
        <span class="hobby-tag">壘球</span>
        <span class="hobby-tag">爬山</span>
        <span class="hobby-tag">看海</span>
      </div>
    </div>

    <div class="card-footer">
      <span class="footer-text">店小二維修團隊 · 陳瑋生</span>
      <span class="footer-text">onlysm958et@gmail.com</span>
    </div>
  </div>
</body>
</html>
